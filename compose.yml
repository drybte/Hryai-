version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: history_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/history_db
      OPENAI_API_KEY: ""
      OPENAI_BASE_URL: https://kurim.ithope.eu/v1
      MODEL_NAME: gemma3:27b
      PORT: 8080
    depends_on:
      - db
