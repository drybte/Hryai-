<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Game Advisor 🎮</title>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --primary: #8b5cf6;
            --text: #f8fafc;
            --accent: #22d3ee;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Levá část - Hlavní panel */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Pravá část - Historie (v rohu/na boku) */
        .sidebar {
            width: 350px;
            background-color: var(--card-bg);
            border-left: 1px solid #334155;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-shadow: -5px 0 15px rgba(0,0,0,0.3);
        }

        .card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            text-align: center;
            max-width: 500px;
            width: 100%;
            border: 1px solid #334155;
        }

        h1 { color: var(--primary); margin-bottom: 10px; }
        
        input {
            width: 80%;
            padding: 12px;
            border-radius: 10px;
            border: 2px solid #334155;
            background: #0f172a;
            color: white;
            font-size: 16px;
            margin-bottom: 20px;
            outline: none;
        }

        input:focus { border-color: var(--primary); }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { transform: scale(1.05); background: #7c3aed; }

        #result {
            margin-top: 25px;
            padding: 15px;
            border-radius: 10px;
            background: rgba(139, 92, 246, 0.1);
            border-left: 4px solid var(--primary);
            display: none;
            text-align: left;
        }

        /* Stylování historie */
        .history-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #historyList {
            list-style: none;
            padding: 0;
            overflow-y: auto;
            flex: 1;
        }

        .history-item {
            background: #0f172a;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 10px;
            font-size: 14px;
            border: 1px solid #334155;
        }

        .history-item b { color: var(--accent); }
        .history-date { font-size: 10px; color: #64748b; display: block; }

        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            display: none;
            margin: 20px auto;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="main-content">
        <div class="card">
            <h1>Herní Poradce 🤖</h1>
            <p>Zadej svůj oblíbený žánr (např. RPG, horor, závodní)</p>
            
            <input type="text" id="genreInput" placeholder="Např. otevřený svět...">
            <br>
            <button onclick="askAI()">Získat doporučení</button>

            <div id="loader" class="loader"></div>
            <div id="result"></div>
        </div>
    </div>

    <div class="sidebar">
        <div class="history-title">
            📜 Historie 
            <button onclick="loadHistory()" style="padding: 5px 10px; font-size: 12px;">Obnovit</button>
        </div>
        <ul id="historyList">
            <p style="color: #64748b; text-align: center;">Zatím žádná historie...</p>
        </ul>
    </div>

    <script>
        // Funkce pro dotaz na AI
        async function askAI() {
            const genre = document.getElementById('genreInput').value;
            const resDiv = document.getElementById('result');
            const loader = document.getElementById('loader');

            if (!genre) return alert("Prosím, zadej žánr!");

            resDiv.style.display = 'none';
            loader.style.display = 'block';

            try {
                const response = await fetch('/recommend', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ genre: genre })
                });

                const data = await response.json();
                loader.style.display = 'none';

                if (response.ok) {
                    resDiv.style.display = 'block';
                    resDiv.innerHTML = `<strong>Doporučení:</strong><br>${data.recommendation}`;
                    // Po úspěšném doporučení hned aktualizujeme historii
                    loadHistory();
                } else {
                    alert("Chyba: " + data.error);
                }
            } catch (err) {
                loader.style.display = 'none';
                alert("Nepodařilo se spojit se serverem.");
            }
        }

        // Funkce pro načtení historie z SQLite databáze
        async function loadHistory() {
            try {
                const res = await fetch('/history');
                const data = await res.json();
                const list = document.getElementById('historyList');
                
                if (data.length === 0) return;

                list.innerHTML = ''; 
                data.forEach(item => {
                    const li = document.createElement('li');
                    li.className = 'history-item';
                    li.innerHTML = `
                        <span class="history-date">${item.timestamp}</span>
                        <b>${item.genre}</b>: ${item.recommendation}
                    `;
                    list.appendChild(li);
                });
            } catch (err) {
                console.error("Chyba při načítání historie:", err);
            }
        }

        // Načíst historii hned při otevření stránky
        window.onload = loadHistory;
    </script>
</body>
</html>
